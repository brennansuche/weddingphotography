      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;

    }

      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    .masonry-grid {
      column-count: 4;
      column-gap: 3px;
      padding: 0 3px 3px;
    }

    @media (max-width: 1200px) { .masonry-grid { column-count: 3; } }
    @media (max-width: 800px)  { .masonry-grid { column-count: 2; } }
    @media (max-width: 480px)  { .masonry-grid { column-count: 1; } }

    .masonry-grid img {
      display: block;
      width: 100%;
      margin-bottom: 3px;
      break-inside: avoid;
      cursor: pointer;
      transition: opacity 0.25s;
    }

    .masonry-grid img:hover { opacity: 0.88; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
    }

    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border: none;
      user-select: none;
    }

    #lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      color: rgba(255,255,255,0.7);
      font-size: 2.2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      background: none;
      border: none;
    }

    #lightbox-close:hover { color: #fff; }

    #lightbox-prev, #lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 2.5rem;
      cursor: pointer;
      padding: 16px 20px;
      background: none;
      border: none;
      transition: color 0.2s;
      user-select: none;
    }

    #lightbox-prev { left: 12px; }
    #lightbox-next { right: 12px; }
    #lightbox-prev:hover, #lightbox-next:hover { color: #fff; }

    #lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
    }

    footer {
      background: #111;
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 40px 20px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    footer a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      margin: 0 12px;
      transition: color 0.2s;
    }

    footer a:hover { color: #fff; }

];
    var current = 0;

    function openLightbox(i) {
      current = i;
      showImage();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function moveLightbox(dir) {
      current = (current + dir + images.length) % images.length;
      showImage();
    }

    function showImage() {
      document.getElementById('lightbox-img').src = images[current];
      document.getElementById('lightbox-counter').textContent = (current + 1) + ' / ' + images.length;
    }

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      var lb = document.getElementById('lightbox');
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') moveLightbox(-1);
      if (e.key === 'ArrowRight') moveLightbox(1);
    });

    // Click backdrop to close
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });
  </script>
